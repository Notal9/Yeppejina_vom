<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>예뻐지나봄 | 서귀포 프라이빗 피부관리샵</title>
<meta property="og:title" content="예뻐지나봄 피부관리샵">
<meta property="og:description" content="25년 경력 원장의 1:1 프라이빗 케어 | 서귀포">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fdf0f2;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 0 40px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    border: 1px solid #f0c0cc;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(201,96,106,0.10);
  }
  .card-top {
    background: linear-gradient(135deg, #c9606a 0%, #e8909a 60%, #f5b8c0 100%);
    padding: 36px 24px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.85);
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.14);
    margin-bottom: 16px;
  }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
  .shop-name {
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .shop-sub {
    color: rgba(255,255,255,0.88);
    font-size: 12px;
    letter-spacing: 2.5px;
    margin-top: 4px;
  }
  .card-body { padding: 24px 24px 20px; }
  .intro-text {
    color: #7a4a52;
    font-size: 13.5px;
    line-height: 1.75;
    text-align: center;
    padding-bottom: 20px;
    border-bottom: 1px dashed #f0c0cc;
    margin-bottom: 20px;
  }
  .intro-text strong { color: #c9606a; }

  /* 이벤트 이미지 */
  .event-img {
    width: 100%;
    border-radius: 12px;
    border: 1px solid #f0c0cc;
    display: block;
    margin-bottom: 20px;
  }

  /* 서비스 메뉴 */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: #c9606a;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .menu-item {
    background: #fff5f7;
    border: 1px solid #f0c0cc;
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .menu-dot { width: 7px; height: 7px; border-radius: 50%; background: #c9606a; flex-shrink: 0; }
  .menu-name { font-size: 13px; color: #5c2a32; font-weight: 500; }
  .menu-desc { font-size: 11px; color: #b07880; margin-top: 2px; }

  .divider { height: 1px; background: #f0c0cc; margin: 0 0 18px; border: none; }

  .btn-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn-call { background: #c9606a; color: #fff; }
  .btn-blog { background: #fff5f7; color: #c9606a; border: 1.5px solid #e8909a; }

  .footer {
    background: #fdf0f2;
    border-top: 1px solid #f0c0cc;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #b07880;
    font-size: 12px;
  }
  .footer-dot { width: 4px; height: 4px; border-radius: 50%; background: #e0a0a8; }
</style>
</head>
